{{ define "500.html" }}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - TauX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#1e3a8a',
                        'brand-blue-light': '#2563eb',
                        'brand-blue-dark': '#1e40af',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="flex items-center justify-center min-h-screen relative overflow-hidden bg-slate-50 text-gray-900">
    <!-- Background Grid -->
    <div class="absolute inset-0 z-0 opacity-10 pointer-events-none"
        style="background-image: linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(circle at center, black, transparent 80%);">
    </div>

    <div class="relative z-10 text-center px-6">
        <h1 class="font-serif text-9xl font-bold mb-4 tracking-tighter text-brand-blue-light">
            500
        </h1>
        <h2 class="font-serif text-3xl font-bold text-gray-900 mb-6">System Error / 系統錯誤</h2>
        <p class="text-gray-600 max-w-lg mx-auto mb-10 text-lg leading-relaxed">
            伺服器遇到非預期的情況，無法完成請求。我們的技術團隊已經接到通知並正在處理中。
        </p>

        <a href="/"
            class="inline-flex items-center gap-2 px-8 py-4 bg-brand-blue-light text-white rounded-full font-bold hover:bg-brand-blue-dark transition-all duration-300 transform hover:-translate-y-1 shadow-md">
            <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            回到首頁
        </a>
    </div>

    <!-- Decorative Elements -->
    <div class="absolute top-1/4 left-10 w-3 h-3 bg-brand-blue-light/20 rounded-full animate-pulse"></div>
    <div class="absolute bottom-1/4 right-10 w-4 h-4 bg-brand-blue-light/10 rounded-full animate-bounce delay-700">
    </div>
</body>

</html>
{{ end }}
