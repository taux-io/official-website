{{ define "404.html" }}
{{ template "header.html" . }}

<section class="relative min-h-screen flex items-center justify-center pt-16 overflow-hidden bg-anthro-cream">
    <div class="relative z-10 max-w-3xl mx-auto px-6 text-center">
        <h1 class="text-8xl md:text-9xl font-display text-anthro-dark mb-4">
            404
        </h1>

        <h2 class="text-2xl md:text-3xl font-display text-anthro-dark mb-6">
            Page Not Found / 找不到頁面
        </h2>

        <p class="text-lg text-anthro-body mb-10 max-w-xl mx-auto leading-relaxed">
            您正在尋找的頁面不存在。它可能已被移除、重新命名或暫時無法使用。
        </p>

        <div class="flex justify-center gap-4">
            <a href="/" class="anthro-btn gap-2">
                回到首頁
            </a>
        </div>
    </div>
</section>

{{ template "footer.html" . }}
{{ end }}
