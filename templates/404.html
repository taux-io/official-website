{{ define "404.html" }}
{{ template "header.html" . }}

<section class="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden bg-slate-50">
    <!-- Background Effects -->
    <div class="absolute inset-0">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-blue-light/5 blur-[100px] rounded-full pointer-events-none">
        </div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
        <!-- 404 Branding -->
        <h1 class="text-8xl md:text-9xl font-serif font-bold text-brand-blue-light mb-4">
            404
        </h1>

        <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-6 font-serif">
            Page Not Found / 找不到頁面
        </h2>

        <p class="text-lg text-gray-600 mb-10 max-w-xl mx-auto leading-relaxed">
            您正在尋找的頁面不存在。它可能已被移除、重新命名或暫時無法使用。
        </p>

        <!-- CTA -->
        <div class="flex justify-center gap-4">
            <a href="/"
                class="inline-flex items-center gap-2 px-8 py-3 text-sm font-bold text-white bg-brand-blue-light rounded-full hover:bg-brand-blue-dark transition-all duration-300 transform hover:-translate-y-1 shadow-md">
                回到首頁
            </a>
        </div>
    </div>
</section>

{{ template "footer.html" . }}
{{ end }}
