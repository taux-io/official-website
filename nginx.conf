worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream app_server {
        server app:8080;
    }

    # Internal Server (SSL terminated by nginx-proxy)
    server {
        listen 80;
        server_name localhost;
        server_tokens off;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=()";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'none';";
        # HSTS handled by nginx-proxy usually, but safe to keep or remove. Keeping for internal completeness.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Custom 404 Page (served by Go)
        error_page 404 /404.html;

        # Custom 500 Page (served by Go - backend is still running)
        error_page 500 /500.html;

        # Custom 502/503/504 Pages (served as static files - backend may be down)
        error_page 502 /static-errors/502.html;
        error_page 503 /static-errors/503.html;
        error_page 504 /static-errors/502.html;

        # Proxy everything to the Go app
        location / {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Allow Nginx to handle errors if upstream returns them
            proxy_intercept_errors on; 
        }

        # Handle the 404 page route (served by Go as well)
        location = /404.html {
             proxy_pass http://app_server;
        }

        # Handle the 500 page route (served by Go)
        location = /500.html {
             proxy_pass http://app_server;
        }

        # Static error pages (served directly by Nginx, no backend needed)
        location /static-errors/ {
            alias /usr/share/nginx/html/errors/;
            internal;
        }
    }
}