version: '3.8'

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - frontend-network
    restart: always

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=app-service@bonbondi.com
    depends_on:
      - nginx-proxy
    networks:
      - frontend-network
    restart: always

  app:
    build: .
    environment:
      - GIN_MODE=release
      - PORT=8080
    networks:
      - backend-network
    restart: always

  nginx:
    environment:
      - VIRTUAL_HOST=taux.io,www.taux.io
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=taux.io,www.taux.io
      - LETSENCRYPT_EMAIL=app-service@bonbondi.com
    depends_on:
      - app
    networks:
      - frontend-network
      - backend-network
    restart: always

volumes:
  certs:
  vhost:
  html:
  acme:

networks:
  frontend-network:
    name: taux_frontend
  backend-network:
    name: taux_backend
    internal: true # 宣告為內部網絡，完全不與外界直接相連
