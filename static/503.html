<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 Service Unavailable - TauX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0f;
            color: #8b8b9e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1.5rem;
            max-width: 32rem;
        }
        .error-code {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            color: #00d4ff;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 60px rgba(0,212,255,0.15);
        }
        h2 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 1.5rem;
            color: #e8e8ed;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.05rem;
            max-width: 28rem;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }
        .status-card {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2rem;
            font-size: 0.85rem;
            color: #8b8b9e;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(12px);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: #00d4ff;
            color: #0a0a0f;
            border-radius: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }
        .btn:hover {
            box-shadow: 0 0 40px rgba(0,212,255,0.4);
            transform: translateY(-2px);
        }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: transparent;
            color: #e8e8ed;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .retry-btn:hover {
            border-color: rgba(0,212,255,0.3);
            color: #00d4ff;
        }
        .glow {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 500px;
            height: 500px;
            background: rgba(0,212,255,0.04);
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }
        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            h2 { font-size: 1.2rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="container">
        <div class="error-code">503</div>
        <h2>Service Unavailable / 服務暫停</h2>
        <div class="status-card">
            <span class="status-dot"></span>
            系統維護或流量過載
        </div>
        <p>
            服務目前暫時無法使用，可能正在進行例行維護或遇到短暫的流量高峰。請稍後再試。
        </p>
        <div class="actions">
            <a href="/" class="btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                回到首頁
            </a>
            <button class="retry-btn" onclick="location.reload()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                重新整理
            </button>
        </div>
    </div>

    <script>
        // Auto-retry every 5 seconds
        let retryCount = 0;
        const maxRetries = 60;
        const retryInterval = setInterval(async () => {
            retryCount++;
            if (retryCount > maxRetries) {
                clearInterval(retryInterval);
                return;
            }
            try {
                const res = await fetch('/health', { method: 'GET', cache: 'no-store' });
                if (res.ok) {
                    clearInterval(retryInterval);
                    location.reload();
                }
            } catch (e) { /* continue retrying */ }
        }, 5000);
    </script>
</body>

</html>
