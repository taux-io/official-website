<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 Service Unavailable - TauX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0f;
            color: #8b8b9e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            color: #00d4ff;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h2 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 1.5rem;
            color: #e8e8ed;
            margin-bottom: 1.5rem;
        }
        p { font-size: 1.1rem; max-width: 28rem; margin: 0 auto 2.5rem; line-height: 1.7; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: #00d4ff;
            color: #0a0a0f;
            border-radius: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }
        .btn:hover { box-shadow: 0 0 40px rgba(0,212,255,0.4); transform: translateY(-2px); }
        .glow { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 500px; background: rgba(0,212,255,0.04); border-radius: 50%; filter: blur(100px); pointer-events: none; }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div style="position:relative;z-index:10;text-align:center;padding:1.5rem;">
        <h1>503</h1>
        <h2>Service Unavailable / 服務暫停</h2>
        <p>服務目前暫時無法使用，可能正在進行維護或遇到短暫的流量高峰。請稍後再試。</p>
        <a href="/" class="btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            回到首頁
        </a>
    </div>
    <script>
        // Auto-retry: check if server is back every 5 seconds
        let n = 0;
        const iv = setInterval(async () => {
            if (++n > 60) { clearInterval(iv); return; }
            try { const r = await fetch('/health', { cache: 'no-store' }); if (r.ok) { clearInterval(iv); location.reload(); } } catch(e) {}
        }, 5000);
    </script>
</body>

</html>
